services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tia
      POSTGRES_PASSWORD: tia
      POSTGRES_DB: tia
    ports:
      - "5432:5432"
    volumes:
      - tia_postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: tia
      MINIO_ROOT_PASSWORD: tia12345
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console
    volumes:
      - tia_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tia_postgres_data:
  tia_minio_data:
